<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teikėjo aplinka - Išmaniosios sutartys</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ... header ir nav lieka nepakitę ... -->
    <main class="container">
        <!-- SUTARČIŲ SKILTIS -->
        <h2>Gautos sutartys derinimui</h2>
        <div id="contracts-list" class="contracts-list-container"></div>
        <!-- ... kitos skilties lieka nepakitusios ... -->
    </main>

    <!-- SUTARČIŲ PERŽIŪROS MODAL -->
    <div id="agreement-view-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>Sutarties peržiūra</h2>
            <div id="agreement-view-text" class="agreement-text" style="height: 250px;"></div>
            <h3>JSON Priedas (ODRL)</h3>
            <pre id="agreement-view-json" style="height: 120px;"></pre>
            
            <!-- Mygtukų konteineris -->
            <div id="agreement-modal-actions" class="modal-actions" style="margin-top: 1rem;">
                <!-- Patvirtinimo/Atmetimo mygtukai bus įkelti čia su JS -->
            </div>
            
            <div class="modal-actions" style="margin-top: 0.5rem;">
                <button id="close-agreement-modal-btn" class="btn-secondary">Uždaryti</button>
            </div>
        </div>
    </div>
    
    <!-- ... konsultacijų modal langas lieka nepakitęs ... -->
    <script src="provider.js"></script>
</body>
</html>
